<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Camera body -->
  <rect x="12" y="20" width="40" height="28" rx="4" fill="#4A90D9" stroke="#2C5F8A" stroke-width="2"/>
  <!-- Lens circle -->
  <circle cx="32" cy="34" r="10" fill="#1A1A2E" stroke="#7BB3F0" stroke-width="2"/>
  <circle cx="32" cy="34" r="6" fill="#2C5F8A" stroke="#7BB3F0" stroke-width="1"/>
  <!-- Lens crosshair -->
  <line x1="32" y1="28" x2="32" y2="40" stroke="#7BB3F0" stroke-width="1" opacity="0.6"/>
  <line x1="26" y1="34" x2="38" y2="34" stroke="#7BB3F0" stroke-width="1" opacity="0.6"/>
  <!-- Viewfinder bump -->
  <rect x="22" y="16" width="12" height="6" rx="2" fill="#4A90D9" stroke="#2C5F8A" stroke-width="1.5"/>
  <!-- Signal/tracking waves -->
  <path d="M48 24 Q54 20 54 28" stroke="#00E5FF" stroke-width="2" fill="none" opacity="0.8"/>
  <path d="M50 22 Q58 16 58 28" stroke="#00E5FF" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M52 20 Q62 12 62 28" stroke="#00E5FF" stroke-width="1" fill="none" opacity="0.3"/>
  <!-- Recording dot -->
  <circle cx="46" cy="24" r="3" fill="#FF4444"/>
</svg>
